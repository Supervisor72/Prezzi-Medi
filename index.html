<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica Delta Prezzi Medi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset & Base Styles */
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --telegram-color: #0088cc;
            --telegram-hover: #006699;
            --background-light: #f8f9fa;
            --background-medium: #e9ecef;
            --text-dark: #343a40;
            --text-medium: #6c757d;
            --border-light: #ced4da;
            --border-radius: 8px;
            --shadow-light: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px var(--shadow-light);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--text-dark);
            margin-bottom: 20px;
            font-size: 2em;
            font-weight: 700;
        }

        p {
            color: var(--text-medium);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95em;
        }

        label .icon {
            margin-right: 8px;
            font-size: 1.1em;
            vertical-align: middle;
        }

        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 1em;
            color: var(--text-dark);
            background-color: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
            outline: none;
        }

        select {
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236c757d%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13.6-6.4H18.8c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%204.6%201.8%208.9%205.4%2012.5l128%20127.9c3.6%203.6%207.8%205.4%2012.5%205.4s8.9-1.8%2012.5-5.4L287%2094.7c3.6-3.6%205.4-7.8%205.4-12.5c0-4.6-1.8-8.9-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 10px;
            padding-right: 40px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 25px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button .icon {
            margin-right: 10px;
            font-size: 1.2em;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .button-telegram {
            background-color: var(--telegram-color);
        }

        .button-telegram:hover {
            background-color: var(--telegram-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verifica Delta Prezzi Medi</h1>
        <p>Inserisci i prezzi medi delle merci per ogni reparto.</p>

        <form id="priceForm">
            <div class="form-group">
                <label for="storeSelect"><span class="icon">📍</span> Seleziona il Punto Vendita:</label>
                <select id="storeSelect" required>
                    <option value="">-- Seleziona --</option>
                    <option value="Fano">Fano</option>
                    <option value="Monsano">Monsano</option>
                    <option value="Osimo">Osimo</option>
                    <option value="Macerata">Macerata</option>
                    <option value="Civitanova">Civitanova</option>
                    <option value="Pesaro">Pesaro</option>
                    <option value="Foligno">Foligno</option>                    
                </select>
            </div>

            <div class="form-group">
                <label for="reportDate"><span class="icon">🗓️</span> Data del Report:</label>
                <input type="date" id="reportDate" required>
            </div>

            <div class="form-group">
                <label for="accessori"><span class="icon">🎧</span> Accessori (€):</label>
                <input type="number" id="accessori" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="clima"><span class="icon">❄️</span> Clima (€):</label>
                <input type="number" id="clima" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="bianco"><span class="icon">🧺</span> Bianco (€):</label>
                <input type="number" id="bianco" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="bruno"><span class="icon">📺</span> Bruno (€):</label>
                <input type="number" id="bruno" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="grigio"><span class="icon">📱</span> Grigio (€):</label>
                <input type="number" id="grigio" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="informatica"><span class="icon">💻</span> Informatica (€):</label>
                <input type="number" id="informatica" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="consolle"><span class="icon">🎮</span> Consolle (€):</label>
                <input type="number" id="consolle" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="mobility"><span class="icon">🚲</span> Mobile (€):</label>
                <input type="number" id="mobility" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="ped"><span class="icon">🍳</span> PED (€):</label>
                <input type="number" id="ped" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="servizi"><span class="icon">🛠️</span> Servizi (€):</label>
                <input type="number" id="servizi" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="totale"><span class="icon">📊</span> Totale (€):</label>
                <input type="number" id="totale" step="0.01" required>
            </div>

            <div class="button-group">
                <button type="button" onclick="generateAndSend('email')"><span class="icon">📧</span> Invia Report tramite Email</button>
                <button type="button" onclick="generateAndSend('telegram')" class="button-telegram"><span class="icon">✈️</span> Invia Report tramite Telegram</button>
            </div>
        </form>
    </div>

    <script>
        let fixedPrices = {
            accessori: 0, clima: 0, bianco: 0, bruno: 0, grigio: 0, informatica: 0, consolle: 0, mobility: 0, ped: 0, servizi: 0, totale: 0
        };

        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6y_tZ5g3bZzV3r5N3hK6b6E8Tz1W5rA9B6Hn-fXW8yU6h5j6B-v7g3R5nZ9p8w4L8XW5b3Z9m8Qv8/pub?output=csv";

        async function loadPricesFromSheet() {
            try {
                const targetUrl = sheetCsvUrl.includes("/edit") 
                    ? sheetCsvUrl.replace(/\/edit.*/, "/pub?output=csv") 
                    : sheetCsvUrl;

                const response = await fetch(targetUrl);
                const csvText = await response.text();
                
                const lines = csvText.split(/\r?\n/);
                lines.forEach(line => {
                    const columns = line.split(',');
                    if (columns.length >= 2) {
                        const key = columns[0].trim().toLowerCase();
                        const value = parseFloat(columns[1].trim());
                        if (key in fixedPrices && !isNaN(value)) {
                            fixedPrices[key] = value;
                        }
                    }
                });
                console.log("Prezzi di riferimento caricati correttamente:", fixedPrices);
            } catch (error) {
                console.error("Errore nel caricamento prezzi:", error);
                alert("Attenzione: impossibile caricare i prezzi di riferimento aggiornati dal server.");
            }
        }

        window.onload = loadPricesFromSheet;

        function generateMessageContent() {
            const storeSelectElement = document.getElementById("storeSelect");
            const selectedStore = storeSelectElement.value;

            const dateInputElement = document.getElementById("reportDate");
            const selectedDate = dateInputElement.value;

            if (selectedStore === "") { alert("Per favore, seleziona il punto vendita."); return null; }
            if (selectedDate === "") { alert("Per favore, seleziona la data del report."); return null; }

            const formattedDate = new Date(selectedDate).toLocaleDateString('it-IT');

            const departments = {
                accessori: "Accessori",
                clima: "Clima",
                bianco: "Bianco",
                bruno: "Bruno",
                grigio: "Grigio",
                informatica: "Informatica",
                consolle: "Consolle",
                mobility: "Mobility",
                ped: "PED",
                servizi: "Servizi",
                totale: "Totale"
            };

            let messageContent = `🚩 Report Criticità: Prezzi Reparti Sottomedia\n\n`;
            messageContent += `📍 Punto Vendita: ${selectedStore}\n`;
            messageContent += `🗓️ Data Report: ${formattedDate}\n\n`;
            messageContent += `Di seguito l'elenco dei soli reparti risultati SOTTOMEDIA rispetto al benchmark della catena:\n\n`;

            let allPricesValid = true;
            let subMediaDetails = [];

            for (const key in departments) {
                const inputElement = document.getElementById(key);
                const enteredPrice = parseFloat(inputElement.value);

                if (isNaN(enteredPrice)) {
                    alert(`Per favore, inserisci un valore numerico valido per ${departments[key]}.`);
                    allPricesValid = false;
                    break;
                }

                const fixedPrice = fixedPrices[key];
                const difference = enteredPrice - fixedPrice;
                const differenceText = difference.toFixed(2);
                let formattedDifference = differenceText.endsWith('.00') ? differenceText.slice(0, -3) : differenceText;

                // Salva nel report ed esporta solo se è inferiore alla media (differenza negativa)
                if (difference < 0) {
                    let line = `🔴 ${departments[key]}: Prezzo inferiore al prezzo medio DML di ${Math.abs(formattedDifference)} €`;
                    subMediaDetails.push(line);
                }
            }

            if (!allPricesValid) return null;

            // Se non ci sono reparti sottomedia, inseriamo una nota positiva
            if (subMediaDetails.length === 0) {
                messageContent += `✅ Ottimo! Nessun reparto risulta sottomedia rispetto alla media aziendale.`;
            } else {
                messageContent += subMediaDetails.join('\n');
            }

            messageContent += `\n\n---\nCordiali saluti,\nIl tuo punto vendita ${selectedStore}`;

            return messageContent;
        }

        function generateAndSend(type) {
            const messageContent = generateMessageContent();
            if (!messageContent) return;

            const storeSelectElement = document.getElementById("storeSelect");
            const selectedStore = storeSelectElement.value;
            const dateInputElement = document.getElementById("reportDate");
            const selectedDate = dateInputElement.value;
            const formattedDate = new Date(selectedDate).toLocaleDateString('it-IT');

            if (type === 'email') {
                const emailTo = "d.pavoni@dml-italia.com";
                const subject = `⚠️ Report Criticità Prezzi Sottomedia - ${selectedStore} - ${formattedDate}`;
                window.location.href = `mailto:${emailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(messageContent)}`;
            } else if (type === 'telegram') {
                const telegramLink = `https://t.me/share/url?url=&text=${encodeURIComponent(messageContent)}`;
                window.open(telegramLink, '_blank');
            }
        }
    </script>
</body>
</html>
